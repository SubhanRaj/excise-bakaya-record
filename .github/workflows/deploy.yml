name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: Which app to deploy
        required: true
        default: both
        type: choice
        options: [both, api, frontend]
  push:
    branches: [main]
    paths:
      - "api/**"
      - "frontend/**"
      - ".github/workflows/deploy.yml"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
            frontend:
              - 'frontend/**'

  deploy-api:
    name: Deploy API Worker
    needs: changes
    if: >
      github.event_name == 'workflow_dispatch' && (inputs.target == 'both' || inputs.target == 'api') ||
      (github.event_name == 'push' && needs.changes.outputs.api == 'true')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: api/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: api
      - name: Build & deploy API Worker
        run: pnpm run deploy
        working-directory: api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-frontend:
    name: Deploy Frontend (Pages)
    needs: changes
    if: >
      github.event_name == 'workflow_dispatch' && (inputs.target == 'both' || inputs.target == 'frontend') ||
      (github.event_name == 'push' && needs.changes.outputs.frontend == 'true')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy frontend --project-name excise-bakaya-form --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
