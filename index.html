<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excise Bakaya Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; padding-top: 40px; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: none; border-radius: 10px; }
        .readonly-field { background-color: #e9ecef; font-weight: bold; }
        .calculated-field { background-color: #d1e7dd; font-weight: bold; color: #0f5132; }
    </style>
</head>
<body>
<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card p-4">
                <h3 class="text-center mb-4 text-primary">Excise Bakaya Recovery Form</h3>
                
                <div class="mb-4">
                    <label class="form-label fw-bold text-danger">1. Select District</label>
                    <select id="districtSelect" class="form-select form-select-lg">
                        <option value="">-- Loading Districts --</option>
                    </select>
                </div>

                <form id="duesForm" style="display: none;">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">2. Total Dues (Auto)</label>
                            <input type="text" id="totalDues" class="form-control readonly-field" readonly>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">3. Dues collected till PAC (Auto)</label>
                            <input type="text" id="tillPac" class="form-control readonly-field" readonly>
                        </div>

                        <div class="col-md-12 mt-4">
                            <label class="form-label text-primary fw-bold">4. Dues collected after PAC (Fill)</label>
                            <input type="number" id="afterPac" class="form-control border-primary" min="0" required>
                        </div>

                        <div class="col-md-12 mt-4">
                            <label class="form-label">5. Total Dues Left (Formula)</label>
                            <input type="text" id="duesLeft" class="form-control calculated-field" readonly>
                        </div>

                        <div class="col-md-6 mt-4">
                            <label class="form-label text-primary fw-bold">6. Batte Khatte Amount (Fill)</label>
                            <input type="number" id="batteKhatte" class="form-control border-primary" min="0" required>
                            <small id="batteError" class="text-danger d-none">Cannot exceed Total Dues Left.</small>
                        </div>
                        <div class="col-md-6 mt-4">
                            <label class="form-label text-primary fw-bold">7. HC Stayed Amount (Fill)</label>
                            <input type="number" id="hcStayed" class="form-control border-primary" min="0" required>
                            <small id="hcError" class="text-danger d-none">Cannot exceed (Total Dues Left - Batte Khatte).</small>
                        </div>

                        <div class="col-md-12 mt-4">
                            <label class="form-label fw-bold text-success fs-5">8. Recovery that has to be done</label>
                            <input type="text" id="finalRecovery" class="form-control calculated-field fs-5" readonly>
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" class="btn btn-primary w-100 mt-5 btn-lg">Update Records</button>
                    <div id="statusMessage" class="mt-3 text-center fw-bold"></div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // Note: Update this URL after deploying your Cloudflare Worker via Wrangler
    const API_URL = "https://excise-bakaya-api.shubhanraj2002.workers.dev"; 
    
    let dbData = [];
    let currentRecord = null;

    const els = {
        select: document.getElementById('districtSelect'),
        form: document.getElementById('duesForm'),
        totalDues: document.getElementById('totalDues'),
        tillPac: document.getElementById('tillPac'),
        afterPac: document.getElementById('afterPac'),
        duesLeft: document.getElementById('duesLeft'),
        batteKhatte: document.getElementById('batteKhatte'),
        hcStayed: document.getElementById('hcStayed'),
        finalRecovery: document.getElementById('finalRecovery'),
        btn: document.getElementById('submitBtn'),
        status: document.getElementById('statusMessage'),
        batteError: document.getElementById('batteError'),
        hcError: document.getElementById('hcError')
    };

    async function loadData() {
        try {
            const res = await fetch(API_URL);
            dbData = await res.json();
            
            els.select.innerHTML = '<option value="">-- Select a District --</option>';
            dbData.forEach(row => {
                const opt = document.createElement('option');
                opt.value = row.id;
                opt.textContent = row.district_name;
                els.select.appendChild(opt);
            });
        } catch (err) {
            els.select.innerHTML = '<option value="">Error Loading Data. Check API_URL.</option>';
            console.error(err);
        }
    }

    els.select.addEventListener('change', (e) => {
        const id = parseInt(e.target.value);
        currentRecord = dbData.find(r => r.id === id);
        
        if (currentRecord) {
            els.form.style.display = 'block';
            els.totalDues.value = currentRecord.total_dues;
            els.tillPac.value = currentRecord.collected_till_pac;
            els.afterPac.value = currentRecord.collected_after_pac;
            els.batteKhatte.value = currentRecord.batte_khatte;
            els.hcStayed.value = currentRecord.hc_stayed;
            els.status.innerHTML = "";
            calculateMath();
        } else {
            els.form.style.display = 'none';
        }
    });

    function calculateMath() {
        if (!currentRecord) return;

        const total = parseFloat(currentRecord.total_dues) || 0;
        const tillPac = parseFloat(currentRecord.collected_till_pac) || 0;
        
        const afterPac = parseFloat(els.afterPac.value) || 0;
        const batte = parseFloat(els.batteKhatte.value) || 0;
        const hc = parseFloat(els.hcStayed.value) || 0;

        const duesLeft = total - tillPac - afterPac;
        els.duesLeft.value = duesLeft;

        let isValid = true;
        
        if (batte > duesLeft) {
            els.batteError.classList.remove('d-none');
            isValid = false;
        } else {
            els.batteError.classList.add('d-none');
        }

        if (hc > (duesLeft - batte)) {
            els.hcError.classList.remove('d-none');
            isValid = false;
        } else {
            els.hcError.classList.add('d-none');
        }

        const recovery = Math.max(0, duesLeft - batte - hc);
        els.finalRecovery.value = recovery;

        els.btn.disabled = !isValid;
    }

    ['afterPac', 'batteKhatte', 'hcStayed'].forEach(id => {
        els[id].addEventListener('input', calculateMath);
    });

    els.form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        els.btn.disabled = true;
        els.btn.textContent = "Saving...";

        const payload = {
            id: currentRecord.id,
            collected_after_pac: parseFloat(els.afterPac.value) || 0,
            batte_khatte: parseFloat(els.batteKhatte.value) || 0,
            hc_stayed: parseFloat(els.hcStayed.value) || 0
        };

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                els.status.innerHTML = '<span class="text-success">Records updated successfully!</span>';
                currentRecord.collected_after_pac = payload.collected_after_pac;
                currentRecord.batte_khatte = payload.batte_khatte;
                currentRecord.hc_stayed = payload.hc_stayed;
            } else {
                els.status.innerHTML = '<span class="text-danger">Failed to save records.</span>';
            }
        } catch (err) {
            els.status.innerHTML = '<span class="text-danger">Network Error.</span>';
        }

        els.btn.disabled = false;
        els.btn.textContent = "Update Records";
    });

    loadData();
</script>
</body>
</html>
