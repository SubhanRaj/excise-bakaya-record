<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Excise Bakaya</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/dexie@latest/dist/dexie.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        body {
            background-color: #f4f6f9;
            padding-top: 30px;
            padding-bottom: 50px;
        }

        .card {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: none;
            border-radius: 12px;
        }

        /* Blur class applied before authentication */
        .blur-content {
            filter: blur(8px);
            pointer-events: none;
            user-select: none;
        }

        .table-responsive {
            max-height: 70vh;
            overflow: auto; /* Allow both vertical and horizontal scroll */
            border-radius: 8px;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.05);
        }

        #bakayaTable {
            border-collapse: separate;
            border-spacing: 0;
            margin: 0;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            /* removed overflow: hidden to fix sticky header */
        }

        #bakayaTable thead th {
            position: sticky;
            top: 0;
            z-index: 10;
            background-color: #2c3e50;
            color: #ffffff;
            font-size: 0.85em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #1a252f;
            padding: 14px 12px;
            vertical-align: middle;
            text-align: center;
        }

        /* Freeze first column (District) */
        #bakayaTable tbody td:first-child,
        #bakayaTable thead th:first-child {
            position: sticky;
            left: 0;
            z-index: 15;
            background-color: #ffffff; /* Opaque background */
            box-shadow: 2px 0 5px -2px rgba(0,0,0,0.1); /* Subtle shadow for depth */
        }

        #bakayaTable thead th:first-child {
            z-index: 20; /* Highest z-index for top-left corner */
            background-color: #2c3e50; /* Match header color */
        }

        /* Freeze footer */
        #bakayaTable tfoot td {
            position: sticky;
            bottom: 0;
            z-index: 10;
            background-color: #d4edda; /* Subtle green to match excel */
            color: #155724;
            border-top: 2px solid #c3e6cb;
            font-size: 0.9em;
        }

        #bakayaTable tfoot td:first-child {
            z-index: 20; /* Highest z-index for bottom-left corner */
            left: 0;
            background-color: #d4edda;
            box-shadow: 2px -2px 5px -2px rgba(0,0,0,0.1);
        }

        .amount-col {
            text-align: right;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 600;
            font-size: 1em;
            color: #333;
        }

        .center-col {
            text-align: center;
        }

        tbody tr {
            transition: all 0.2s ease;
        }

        tbody tr:hover {
            background-color: #e9ecef !important;
            transform: scale(1.002);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .btn-unlock {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 600;
        }

        .deo-name {
            display: block;
            font-size: 0.8em;
            color: #6c757d;
            font-weight: normal;
            margin-top: 2px;
        }
    </style>
</head>

<body>

    <div id="mainContainer" class="container-fluid px-4 blur-content">
        <div class="card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom flex-wrap gap-3">
                <h3 class="text-primary m-0 fw-bold">Admin View: District-wise Excise Bakaya</h3>
                <div class="d-flex align-items-center gap-2">
                    <span id="lastSyncTime" class="text-muted small fw-bold me-2"></span>
                    <button id="btnSync" class="btn btn-outline-secondary btn-sm fw-bold shadow-sm" onclick="syncData()"><i class="ti ti-refresh"></i> Sync</button>
                    <button id="btnExportExcel" class="btn btn-outline-success btn-sm fw-bold shadow-sm" onclick="exportToExcel()"><i class="ti ti-file-spreadsheet"></i> Excel</button>
                    <button id="btnExportSQL" class="btn btn-outline-info btn-sm fw-bold shadow-sm" onclick="exportToSQL()"><i class="ti ti-database-export"></i> SQL</button>
                    <button id="btnTruncateDemo" class="btn btn-outline-warning btn-sm fw-bold shadow-sm" onclick="truncateDemoDistrict()"><i class="ti ti-eraser"></i> Truncate Demo</button>
                    <button id="btnLogout" class="btn btn-outline-danger btn-sm fw-bold shadow-sm" onclick="logoutAdmin()"><i class="ti ti-logout"></i> Logout</button>
                </div>
            </div>

            <div class="table-responsive">
                <table id="bakayaTable" class="table table-striped table-bordered table-hover align-middle w-100">
                    <thead>
                        <tr>
                            <th>District</th>
                            <th>वसूल की जाने वाली सकल धनराशि</th>
                            <th>08-Jul-26 तक वसूल की गई</th>
                            <th>08-Jul-26 के उपरांत वसूल की गई</th>
                            <th class="center-col">बट्टे खाते (Count)</th>
                            <th>बट्टे खाते (Amount)</th>
                            <th class="center-col">न्यायालय स्थगित (Count)</th>
                            <th>सक्षम न्यायालय द्वारा स्थिगित</th>
                            <th>शुद्ध वसूल की जाने वाली</th>
                            <th class="center-col">Status</th>
                            <th>Locked Info</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                    <tfoot id="tableFoot" class="fw-bold">
                    </tfoot>
                </table>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

    <script>
        const API_URL = "https://excise-bakaya-api.shubhanraj2002.workers.dev/";
        
        const db = new Dexie("AdminBakayaDB");
        db.version(1).stores({
            districts: 'id, district_name'
        });

        let lastSyncDate = localStorage.getItem('admin_last_sync');

        function formatNumber(num) {
            if (!num) return "₹ 0";
            return "₹ " + Number(num).toLocaleString('en-IN');
        }
        
        function updateSyncUI() {
            if (lastSyncDate) {
                document.getElementById('lastSyncTime').textContent = "Last Sync: " + new Date(lastSyncDate).toLocaleString('en-IN');
            }
        }

        async function authenticateAdmin() {
            if (sessionStorage.getItem('admin_auth') === 'true') {
                document.getElementById('mainContainer').classList.remove('blur-content');
                updateSyncUI();
                loadAdminData();
                return;
            }

            const { value: pin } = await Swal.fire({
                title: 'Admin Authorization',
                text: 'Enter your 4-digit PIN to access this dashboard',
                input: 'password',
                inputPlaceholder: 'Admin PIN',
                allowOutsideClick: false,
                allowEscapeKey: false,
                showCancelButton: false,
                confirmButtonColor: '#0d6efd',
                confirmButtonText: 'Verify',
                inputValidator: (value) => {
                    if (!value) return 'PIN is required!';
                }
            });

            if (pin) {
                try {
                    Swal.showLoading();
                    const res = await fetch(API_URL + 'auth', {
                        method: 'POST',
                        credentials: 'include', // required to receive the httpOnly admin session cookie
                        headers: { 'Content-Type': 'application/json', 'X-API-Secret': '63eefe946a94699dd661ebdd83150caec566e2c8c6cf63839165d4bf98f080f2' },
                        body: JSON.stringify({ pin: pin })
                    });

                    if (res.ok) {
                        sessionStorage.setItem('admin_auth', 'true');
                        document.getElementById('mainContainer').classList.remove('blur-content');
                        Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Verified Successfully', showConfirmButton: false, timer: 1500 });
                        updateSyncUI();
                        loadAdminData();
                    } else {
                        await Swal.fire('Access Denied', 'Incorrect Admin PIN.', 'error');
                        authenticateAdmin();
                    }
                } catch (err) {
                    await Swal.fire('Error', 'Network connection failed.', 'error');
                    authenticateAdmin();
                }
            } else {
                authenticateAdmin();
            }
        }

        function sessionExpiredAdmin() {
            Swal.fire('Session Expired', 'आपका सत्र समाप्त हो गया है। कृपया पुनः लॉगिन करें। / Your session has expired. Please log in again.', 'error').then(() => {
                sessionStorage.removeItem('admin_auth');
                location.reload();
            });
        }

        async function logoutAdmin() {
            try {
                await fetch(API_URL + 'admin-logout', {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'X-API-Secret': '63eefe946a94699dd661ebdd83150caec566e2c8c6cf63839165d4bf98f080f2' }
                });
            } catch (err) { /* best-effort — clearing sessionStorage below still logs the browser out */ }
            sessionStorage.removeItem('admin_auth');
            location.reload();
        }

        async function loadAdminData() {
            try {
                const count = await db.districts.count();
                if (count > 0) {
                    const dbData = await db.districts.orderBy('district_name').toArray();
                    renderTable(dbData);
                } else {
                    await syncData(false);
                }
            } catch (err) {
                console.error(err);
                syncData(false); // fallback to network
            }
        }

        async function syncData(showToast = true) {
            try {
                if (showToast) Swal.showLoading();
                
                const res = await fetch(API_URL, {
                    headers: { 'X-API-Secret': '63eefe946a94699dd661ebdd83150caec566e2c8c6cf63839165d4bf98f080f2' }
                });
                if (!res.ok) throw new Error("Failed to fetch");
                const dbData = await res.json();
                
                await db.districts.clear();
                await db.districts.bulkAdd(dbData);
                
                lastSyncDate = new Date().toISOString();
                localStorage.setItem('admin_last_sync', lastSyncDate);
                updateSyncUI();
                
                renderTable(dbData);
                if (showToast) Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Data Synced Successfully', showConfirmButton: false, timer: 1500 });
            } catch (err) {
                if (showToast) Swal.fire('Error', 'Failed to sync data.', 'error');
            }
        }

        function renderTable(dbData) {
            const tbody = document.getElementById('tableBody');
            let rowsHtml = '';
            
            let tGross = 0, tTill = 0, tAfter = 0, tBCount = 0, tBAmt = 0, tCourtCount = 0, tCourt = 0, tNet = 0;

            dbData.forEach(row => {
                const totalDues = parseFloat(row.total_dues) || 0;
                const tillDate = parseFloat(row.collected_till_date) || 0;
                const afterDate = parseFloat(row.collected_after_date) || 0;
                const batteCount = parseInt(row.batte_khatte_count) || 0;
                const batteAmount = parseFloat(row.batte_khatte_amount) || 0;
                const courtCaseCount = parseInt(row.court_case_count) || 0;
                const courtStayed = parseFloat(row.court_stayed_amount) || 0;

                const duesLeft = totalDues - tillDate - afterDate;
                const targetRecovery = Math.max(0, duesLeft - batteAmount - courtStayed);

                tGross += totalDues;
                tTill += tillDate;
                tAfter += afterDate;
                tBCount += batteCount;
                tBAmt += batteAmount;
                tCourtCount += courtCaseCount;
                tCourt += courtStayed;
                tNet += targetRecovery;

                const updatedTime = row.locked_at
                    ? new Date(row.locked_at.replace(' ', 'T') + 'Z').toLocaleString('en-IN', { timeZone: 'Asia/Kolkata', dateStyle: 'short', timeStyle: 'short' })
                    : '<span class="text-muted">Not Locked</span>';

                const deoNameStr = row.deo_name ? `<span class="deo-name">DEO: ${row.deo_name}</span>` : '';

                let statusHtml = '';
                if (row.is_locked === 1) {
                    statusHtml = `
                    <div class="d-flex flex-column align-items-center gap-1">
                        <span class="badge bg-danger">Locked</span>
                        <button class="btn btn-outline-danger btn-unlock" onclick="unlockDistrict(${row.id}, '${row.district_name}')">Unlock</button>
                    </div>
                `;
                } else {
                    statusHtml = '<span class="badge bg-success">Open</span>';
                }

                rowsHtml += `
                <tr>
                    <td class="fw-bold text-dark">${row.district_name}</td>
                    <td class="amount-col">${formatNumber(totalDues)}</td>
                    <td class="amount-col">${formatNumber(tillDate)}</td>
                    <td class="amount-col">${formatNumber(afterDate)}</td>
                    <td class="center-col fw-bold">${batteCount}</td>
                    <td class="amount-col">${formatNumber(batteAmount)}</td>
                    <td class="center-col fw-bold">${courtCaseCount}</td>
                    <td class="amount-col">${formatNumber(courtStayed)}</td>
                    <td class="amount-col fw-bold">${formatNumber(targetRecovery)}</td>
                    <td class="center-col">${statusHtml}</td>
                    <td class="small">${updatedTime}${deoNameStr}</td>
                </tr>
            `;
            });

            if ($.fn.DataTable.isDataTable('#bakayaTable')) {
                $('#bakayaTable').DataTable().destroy();
            }

            tbody.innerHTML = rowsHtml;
            document.getElementById('tableFoot').innerHTML = `<tr>
                <td>Total (${dbData.length} Districts)</td>
                <td class="amount-col">${formatNumber(tGross)}</td>
                <td class="amount-col">${formatNumber(tTill)}</td>
                <td class="amount-col">${formatNumber(tAfter)}</td>
                <td class="center-col">${tBCount}</td>
                <td class="amount-col">${formatNumber(tBAmt)}</td>
                <td class="center-col">${tCourtCount}</td>
                <td class="amount-col">${formatNumber(tCourt)}</td>
                <td class="amount-col text-danger">${formatNumber(tNet)}</td>
                <td class="center-col">-</td>
                <td class="small">-</td>
            </tr>`;

            $('#bakayaTable').DataTable({
                pageLength: 100,
                order: [[0, 'asc']],
                language: { search: "Filter records:" }
            });
        }

        async function unlockDistrict(id, districtName) {
            const result = await Swal.fire({
                title: 'अनलॉक की पुष्टि करें',
                html: `<span lang="hi">क्या आप वाकई <strong>${districtName}</strong> जिले के लिए डेटा एंट्री पुनः खोलना चाहते हैं?</span>`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#dc2626',
                confirmButtonText: 'हाँ, अनलॉक करें',
                cancelButtonText: 'रद्द करें'
            });

            if (result.isConfirmed) {
                try {
                    const res = await fetch(API_URL + "unlock", {
                        method: 'POST',
                        credentials: 'include',
                        headers: { 'Content-Type': 'application/json', 'X-API-Secret': '63eefe946a94699dd661ebdd83150caec566e2c8c6cf63839165d4bf98f080f2' },
                        body: JSON.stringify({ id: id })
                    });

                    if (res.ok) {
                        Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Unlocked Successfully', showConfirmButton: false, timer: 2000 });
                        // Also trigger a re-sync
                        syncData(false);
                    } else if (res.status === 403) {
                        sessionExpiredAdmin();
                    } else {
                        Swal.fire('Error', 'Failed to unlock.', 'error');
                    }
                } catch (err) {
                    Swal.fire('Error', 'Network error.', 'error');
                }
            }
        }

        async function truncateDemoDistrict() {
            const result = await Swal.fire({
                title: 'डेमो डेटा हटाएं?',
                html: '<span lang="hi">यह डेटाबेस से Demo District को <strong class="text-danger">स्थायी रूप से</strong> हटा देगा। यह क्रिया पूर्ववत नहीं की जा सकती।</span>',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#dc2626',
                confirmButtonText: 'हाँ, हटाएं',
                cancelButtonText: 'रद्द करें'
            });

            if (result.isConfirmed) {
                try {
                    const res = await fetch(API_URL + "truncate-demo", {
                        method: 'POST',
                        credentials: 'include',
                        headers: { 'Content-Type': 'application/json', 'X-API-Secret': '63eefe946a94699dd661ebdd83150caec566e2c8c6cf63839165d4bf98f080f2' }
                    });

                    if (res.ok) {
                        Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Demo District Deleted', showConfirmButton: false, timer: 2000 });
                        syncData(false);
                    } else if (res.status === 403) {
                        sessionExpiredAdmin();
                    } else {
                        const data = await res.json();
                        Swal.fire('Error', data.error || 'Failed to truncate.', 'error');
                    }
                } catch (err) {
                    Swal.fire('Error', 'Network error.', 'error');
                }
            }
        }

        async function exportToExcel() {
            Swal.fire({
                title: 'Preparing Export',
                text: 'Fetching latest data...',
                allowOutsideClick: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });

            await syncData(false); // Sync data silently

            const data = await db.districts.orderBy('district_name').toArray();
            if (!data || data.length === 0) {
                Swal.close();
                return Swal.fire('Info', 'No data to export.', 'info');
            }
            
            let tGrossE = 0, tTillE = 0, tAfterE = 0, tBCountE = 0, tBAmtE = 0, tCourtCountE = 0, tCourtE = 0, tNetE = 0;
            const exportData = data.map(row => {
                const duesLeft = (row.total_dues || 0) - (row.collected_till_date || 0) - (row.collected_after_date || 0);
                const target = Math.max(0, duesLeft - (row.batte_khatte_amount || 0) - (row.court_stayed_amount || 0));

                tGrossE += (row.total_dues || 0);
                tTillE += (row.collected_till_date || 0);
                tAfterE += (row.collected_after_date || 0);
                tBCountE += (row.batte_khatte_count || 0);
                tBAmtE += (row.batte_khatte_amount || 0);
                tCourtCountE += (row.court_case_count || 0);
                tCourtE += (row.court_stayed_amount || 0);
                tNetE += target;

                return {
                    "District Name": row.district_name,
                    "Total Dues": row.total_dues,
                    "Collected Till 08-Jul-26": row.collected_till_date,
                    "Collected After 08-Jul-26": row.collected_after_date,
                    "Batte Khatte Count": row.batte_khatte_count,
                    "Batte Khatte Amount": row.batte_khatte_amount,
                    "Court Case Count": row.court_case_count,
                    "Court Stayed Amount": row.court_stayed_amount,
                    "Total Dues Left": duesLeft,
                    "Net Recoverable Target": target,
                    "Status": row.is_locked === 1 ? 'Locked' : 'Open',
                    "DEO Name": row.deo_name || 'N/A',
                    "Locked At": row.locked_at ? new Date(row.locked_at.replace(' ', 'T') + 'Z').toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' }) : 'N/A'
                };
            });

            exportData.push({
                "District Name": `TOTAL (${data.length} Districts)`,
                "Total Dues": tGrossE,
                "Collected Till 08-Jul-26": tTillE,
                "Collected After 08-Jul-26": tAfterE,
                "Batte Khatte Count": tBCountE,
                "Batte Khatte Amount": tBAmtE,
                "Court Case Count": tCourtCountE,
                "Court Stayed Amount": tCourtE,
                "Total Dues Left": tGrossE - tTillE - tAfterE,
                "Net Recoverable Target": tNetE,
                "Status": "-",
                "DEO Name": "-",
                "Locked At": "-"
            });
            
            const ws = XLSX.utils.json_to_sheet(exportData, { origin: "A3" });

            const now = new Date();
            const formattedDate = now.toLocaleString('en-IN', { timeZone: 'Asia/Kolkata', dateStyle: 'medium', timeStyle: 'short' });
            
            XLSX.utils.sheet_add_aoa(ws, [[`Excise Bakaya District Wise Summary as on ${formattedDate}`]], { origin: "A1" });
            ws['!merges'] = [{ s: {r: 0, c: 0}, e: {r: 0, c: 12} }];

            ws['!cols'] = [
                { wch: 20 }, { wch: 22 }, { wch: 24 }, { wch: 26 },
                { wch: 20 }, { wch: 22 }, { wch: 20 }, { wch: 26 },
                { wch: 20 }, { wch: 24 }, { wch: 12 }, { wch: 25 }, { wch: 22 }
            ];

            ws['!views'] = [{ state: 'frozen', xSplit: 0, ySplit: 3 }];

            const range = XLSX.utils.decode_range(ws['!ref']);
            for (let R = range.s.r; R <= range.e.r; ++R) {
                for (let C = range.s.c; C <= range.e.c; ++C) {
                    const cellRef = XLSX.utils.encode_cell({c: C, r: R});
                    if (!ws[cellRef]) continue;

                    if (R === 0) {
                        ws[cellRef].s = {
                            font: { bold: true, sz: 14, color: { rgb: "2C3E50" } },
                            alignment: { horizontal: "center", vertical: "center" }
                        };
                    } else if (R === 2) {
                        ws[cellRef].s = {
                            font: { bold: true, color: { rgb: "FFFFFF" } },
                            fill: { fgColor: { rgb: "2C3E50" } },
                            alignment: { horizontal: "center", vertical: "center", wrapText: true }
                        };
                    } else if (R === range.e.r) {
                        ws[cellRef].s = { 
                            font: { bold: true, color: { rgb: "155724" } }, 
                            fill: { fgColor: { rgb: "D4EDDA" } }, // Beautiful subtle green
                            alignment: { vertical: "center" } 
                        };
                        const amountCols = [1, 2, 3, 5, 7, 8, 9];
                        if (amountCols.includes(C)) {
                            ws[cellRef].z = '"₹"#,##0.00';
                            ws[cellRef].s.alignment.horizontal = "right";
                        } else if (C === 4 || C === 6 || C === 10) {
                            ws[cellRef].s.alignment.horizontal = "center";
                        }
                    } else if (R > 2) {
                        ws[cellRef].s = { alignment: { vertical: "center" } };
                        const amountCols = [1, 2, 3, 5, 7, 8, 9];
                        if (amountCols.includes(C)) {
                            ws[cellRef].z = '"₹"#,##0.00';
                            ws[cellRef].s.alignment.horizontal = "right";
                        } else if (C === 4 || C === 6 || C === 10) {
                            ws[cellRef].s.alignment.horizontal = "center";
                        }
                    }
                }
            }

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Excise_Bakaya");
            
            const fileDateStr = now.toLocaleDateString('en-GB').replace(/\//g, '-');
            const fileTimeStr = now.toLocaleTimeString('en-GB', {hour: '2-digit', minute: '2-digit', second: '2-digit'}).replace(/:/g, '-');
            XLSX.writeFile(wb, `Excise_Bakaya_Report_${fileDateStr}_${fileTimeStr}.xlsx`);

            Swal.close();
        }

        async function exportToSQL() {
            const data = await db.districts.orderBy('district_name').toArray();
            if (!data || data.length === 0) return Swal.fire('Info', 'No data to export. Please sync.', 'info');
            
            let sql = "-- Backup generated on " + new Date().toISOString() + "\n";
            data.forEach(row => {
                const lAt = row.locked_at ? `'${row.locked_at}'` : 'NULL';
                const dName = row.deo_name ? `'${row.deo_name}'` : 'NULL';
                sql += `UPDATE excise_dues SET collected_after_date = ${row.collected_after_date}, batte_khatte_count = ${row.batte_khatte_count}, batte_khatte_amount = ${row.batte_khatte_amount}, court_case_count = ${row.court_case_count}, court_stayed_amount = ${row.court_stayed_amount}, is_locked = ${row.is_locked}, deo_name = ${dName}, locked_at = ${lAt} WHERE id = ${row.id};\n`;
            });
            
            const blob = new Blob([sql], { type: "text/plain;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `bakaya_backup_${new Date().toISOString().split('T')[0]}.sql`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Trigger Authentication on Load
        $(document).ready(function () {
            authenticateAdmin();
        });
    </script>

</body>
