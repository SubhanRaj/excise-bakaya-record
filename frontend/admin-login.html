<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Excise Bakaya Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        body {
            background-color: #f4f6f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: none;
            border-radius: 10px;
            max-width: 420px;
            width: 100%;
        }

        .brand-badge {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            background: #dc2626;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            margin: 0 auto 1rem;
        }
    </style>
</head>

<body>
    <div class="card login-card p-4">
        <div class="text-center mb-4">
            <div class="brand-badge"><i class="ti ti-shield-lock"></i></div>
            <h6 class="fw-bold mb-0">Department of Excise, Uttar Pradesh</h6>
            <p class="text-muted small mb-1">Admin Dashboard</p>
            <p class="text-muted small mb-0" lang="hi">प्रशासक डैशबोर्ड</p>
        </div>

        <form id="loginForm">
            <label class="form-label fw-bold">Admin PIN</label>
            <input type="password" id="pinInput" class="form-control form-control-lg mb-2"
                placeholder="Admin PIN" maxlength="20" inputmode="numeric" autocomplete="off" autofocus>

            <div id="loginError" class="alert alert-danger small py-2 px-3 mb-3 d-none" role="alert"></div>

            <button type="submit" id="loginBtn" class="btn btn-danger w-100 fw-bold">Verify / सत्यापित करें</button>
        </form>
    </div>

    <script>
        const API_URL = "https://excise-bakaya-api.shubhanraj2002.workers.dev/";
        const API_SECRET = "63eefe946a94699dd661ebdd83150caec566e2c8c6cf63839165d4bf98f080f2";

        // Already logged in this tab? Skip straight to the dashboard.
        if (sessionStorage.getItem('admin_auth') === 'true') {
            location.href = 'admin.html';
        }

        const pinInput = document.getElementById('pinInput');
        const errorBox = document.getElementById('loginError');
        const loginBtn = document.getElementById('loginBtn');

        function showError(msg) {
            errorBox.textContent = msg;
            errorBox.classList.remove('d-none');
        }

        function clearError() {
            errorBox.classList.add('d-none');
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            clearError();

            const pin = pinInput.value.trim();
            if (!pin) {
                return showError('PIN आवश्यक है / PIN is required.');
            }

            loginBtn.disabled = true;
            loginBtn.textContent = 'सत्यापित हो रहा है... / Verifying...';

            try {
                const res = await fetch(API_URL + 'auth', {
                    method: 'POST',
                    credentials: 'include', // required to receive the httpOnly admin session cookie
                    headers: { 'Content-Type': 'application/json', 'X-API-Secret': API_SECRET },
                    body: JSON.stringify({ pin })
                });

                if (res.ok) {
                    sessionStorage.setItem('admin_auth', 'true');
                    location.href = 'admin.html';
                } else if (res.status === 429) {
                    showError('बहुत अधिक प्रयास। कृपया बाद में पुनः प्रयास करें। / Too many attempts. Try again later.');
                } else {
                    showError('गलत PIN / Incorrect PIN.');
                }
            } catch (err) {
                showError('नेटवर्क त्रुटि, पुनः प्रयास करें। / Network error, please try again.');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Verify / सत्यापित करें';
                pinInput.value = '';
            }
        });
    </script>
</body>

</html>
