<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excise Bakaya Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9;
            padding-top: 40px;
        }

        .card {
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: none;
            border-radius: 10px;
        }

        .readonly-field {
            background-color: #e9ecef;
            font-weight: bold;
        }

        .calculated-field {
            background-color: #d1e7dd;
            font-weight: bold;
            color: #0f5132;
        }

        .currency-symbol::before {
            content: "₹ ";
            color: #6c757d;
        }
    </style>
</head>

<body>
    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card p-4">
                    <h3 class="text-center mb-4 text-primary">Excise Bakaya Recovery Form</h3>

                    <div class="mb-4">
                        <label class="form-label fw-bold text-danger">1. Select District</label>
                        <select id="districtSelect" class="form-select form-select-lg">
                            <option value="">-- Loading Districts --</option>
                        </select>
                    </div>

                    <div id="lockMessage" class="alert alert-warning d-none text-center fw-bold">
                        This district has already submitted its data and is currently locked. Contact the Admin to
                        reset.
                    </div>

                    <form id="duesForm" style="display: none;">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">2. Total Dues</label>
                                <div class="input-group">
                                    <span class="input-group-text">₹</span>
                                    <input type="text" id="totalDues" class="form-control readonly-field" readonly>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">3. Dues collected till date 13-November-2025</label>
                                <div class="input-group">
                                    <span class="input-group-text">₹</span>
                                    <input type="text" id="tillPac" class="form-control readonly-field" readonly>
                                </div>
                            </div>

                            <div class="col-md-12 mt-4">
                                <label class="form-label text-primary fw-bold">4. Dues collected after
                                    13-November-2025</label>
                                <div class="input-group">
                                    <span class="input-group-text">₹</span>
                                    <input type="text" id="afterPac" class="form-control border-primary format-inr"
                                        required>
                                </div>
                            </div>

                            <div class="col-md-12 mt-4">
                                <label class="form-label">5. Total Dues Left</label>
                                <div class="input-group">
                                    <span class="input-group-text">₹</span>
                                    <input type="text" id="duesLeft" class="form-control calculated-field" readonly>
                                </div>
                            </div>

                            <div class="col-md-12 mt-4">
                                <label class="form-label text-primary fw-bold">6. Mukhyalaya ko bheji gyi batte khate ke
                                    prakaran ki sankhya evam usme nihit dhanrashi (आयुक्तालय को प्रेषित बट्टे खाते में
                                    डाले जाने वाले प्रकरणों की संख्या एवं उसमें निहित धनराशि)</label>
                                <div class="row g-2">
                                    <div class="col-md-4">
                                        <div class="input-group">
                                            <span class="input-group-text bg-light">Count</span>
                                            <input type="number" id="batteKhatteCount"
                                                class="form-control border-primary" min="0" placeholder="0" required>
                                        </div>
                                    </div>
                                    <div class="col-md-8">
                                        <div class="input-group">
                                            <span class="input-group-text">₹ Amount</span>
                                            <input type="text" id="batteKhatteAmount"
                                                class="form-control border-primary format-inr" required>
                                        </div>
                                        <small id="batteError" class="text-danger d-none mt-1">Amount cannot exceed
                                            Total Dues Left.</small>
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-12 mt-4">
                                <label class="form-label text-primary fw-bold">7. Amount in any court stayed</label>
                                <div class="input-group">
                                    <span class="input-group-text">₹</span>
                                    <input type="text" id="courtStayed" class="form-control border-primary format-inr"
                                        required>
                                </div>
                                <small id="courtError" class="text-danger d-none">Cannot exceed (Total Dues Left - Batte
                                    Khatte Amount).</small>
                            </div>

                            <div class="col-md-12 mt-4">
                                <label class="form-label fw-bold text-success fs-5">8. Net recoverable amount</label>
                                <div class="input-group input-group-lg">
                                    <span class="input-group-text bg-success text-white border-success">₹</span>
                                    <input type="text" id="finalRecovery"
                                        class="form-control calculated-field border-success fs-5 text-success" readonly>
                                </div>
                            </div>
                        </div>

                        <button type="submit" id="submitBtn" class="btn btn-primary w-100 mt-5 btn-lg">Submit & Lock
                            Records</button>
                        <div id="statusMessage" class="mt-3 text-center fw-bold"></div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cleave.js/1.6.0/cleave.min.js"></script>

    <script>
        const API_URL = "https://excise-bakaya-api.shubhanraj2002.workers.dev/";

        let dbData = [];
        let currentRecord = null;

        // Indian Number Formatting Instance Setup
        const indianCurrencyFormatter = new Intl.NumberFormat('en-IN');

        // Initialize Cleave.js formatters to variables so we can extract raw numbers easily
        let cleaveAfterPac = new Cleave('#afterPac', { numeral: true, numeralThousandsGroupStyle: 'lakh' });
        let cleaveBatte = new Cleave('#batteKhatteAmount', { numeral: true, numeralThousandsGroupStyle: 'lakh' });
        let cleaveCourt = new Cleave('#courtStayed', { numeral: true, numeralThousandsGroupStyle: 'lakh' });

        const els = {
            select: document.getElementById('districtSelect'),
            form: document.getElementById('duesForm'),
            lockMsg: document.getElementById('lockMessage'),
            totalDues: document.getElementById('totalDues'),
            tillPac: document.getElementById('tillPac'),
            duesLeft: document.getElementById('duesLeft'),
            batteKhatteCount: document.getElementById('batteKhatteCount'),
            finalRecovery: document.getElementById('finalRecovery'),
            btn: document.getElementById('submitBtn'),
            status: document.getElementById('statusMessage'),
            batteError: document.getElementById('batteError'),
            courtError: document.getElementById('courtError')
        };

        async function loadData() {
            try {
                const res = await fetch(API_URL);
                dbData = await res.json();

                els.select.innerHTML = '<option value="">-- Select a District --</option>';
                dbData.forEach(row => {
                    const opt = document.createElement('option');
                    opt.value = row.id;
                    opt.textContent = row.district_name;
                    els.select.appendChild(opt);
                });
            } catch (err) {
                els.select.innerHTML = '<option value="">Error Loading Data.</option>';
                console.error(err);
            }
        }

        els.select.addEventListener('change', (e) => {
            const id = parseInt(e.target.value);
            currentRecord = dbData.find(r => r.id === id);

            els.status.innerHTML = "";

            if (currentRecord) {
                // Check DB Flag OR LocalStorage Flag for locking
                const isLocalLocked = localStorage.getItem(`locked_district_${id}`);

                if (currentRecord.is_locked === 1 || isLocalLocked === 'true') {
                    els.form.style.display = 'none';
                    els.lockMsg.classList.remove('d-none');
                } else {
                    els.lockMsg.classList.add('d-none');
                    els.form.style.display = 'block';

                    // Format read-only fields strictly for display
                    els.totalDues.value = indianCurrencyFormatter.format(currentRecord.total_dues);
                    els.tillPac.value = indianCurrencyFormatter.format(currentRecord.collected_till_date);

                    // Reset editable fields
                    cleaveAfterPac.setRawValue('0');
                    els.batteKhatteCount.value = '0';
                    cleaveBatte.setRawValue('0');
                    cleaveCourt.setRawValue('0');

                    calculateMath();
                }
            } else {
                els.form.style.display = 'none';
                els.lockMsg.classList.add('d-none');
            }
        });

        function calculateMath() {
            if (!currentRecord) return;

            const total = parseFloat(currentRecord.total_dues) || 0;
            const tillPac = parseFloat(currentRecord.collected_till_date) || 0;

            // Extract raw numbers from Cleave formatted inputs
            const afterPac = parseFloat(cleaveAfterPac.getRawValue()) || 0;
            const batteAmt = parseFloat(cleaveBatte.getRawValue()) || 0;
            const court = parseFloat(cleaveCourt.getRawValue()) || 0;

            const duesLeft = total - tillPac - afterPac;
            els.duesLeft.value = indianCurrencyFormatter.format(duesLeft);

            let isValid = true;

            if (batteAmt > duesLeft) {
                els.batteError.classList.remove('d-none');
                isValid = false;
            } else {
                els.batteError.classList.add('d-none');
            }

            if (court > (duesLeft - batteAmt)) {
                els.courtError.classList.remove('d-none');
                isValid = false;
            } else {
                els.courtError.classList.add('d-none');
            }

            const recovery = Math.max(0, duesLeft - batteAmt - court);
            els.finalRecovery.value = indianCurrencyFormatter.format(recovery);

            els.btn.disabled = !isValid;
        }

        // Attach listeners to Cleave elements
        document.getElementById('afterPac').addEventListener('input', calculateMath);
        document.getElementById('batteKhatteAmount').addEventListener('input', calculateMath);
        document.getElementById('courtStayed').addEventListener('input', calculateMath);

        els.form.addEventListener('submit', async (e) => {
            e.preventDefault();

            els.btn.disabled = true;
            els.btn.textContent = "Saving & Locking...";

            const payload = {
                id: currentRecord.id,
                collected_after_date: parseFloat(cleaveAfterPac.getRawValue()) || 0,
                batte_khatte_count: parseInt(els.batteKhatteCount.value) || 0,
                batte_khatte_amount: parseFloat(cleaveBatte.getRawValue()) || 0,
                court_stayed_amount: parseFloat(cleaveCourt.getRawValue()) || 0
            };

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    // Lock in local storage
                    localStorage.setItem(`locked_district_${currentRecord.id}`, 'true');

                    els.form.style.display = 'none';
                    els.lockMsg.classList.remove('d-none');
                    els.lockMsg.innerHTML = "Records successfully submitted and locked. Thank you.";

                    // Update internal state to match DB
                    currentRecord.is_locked = 1;
                } else {
                    els.status.innerHTML = '<span class="text-danger">Failed to save records.</span>';
                    els.btn.disabled = false;
                    els.btn.textContent = "Submit & Lock Records";
                }
            } catch (err) {
                els.status.innerHTML = '<span class="text-danger">Network Error.</span>';
                els.btn.disabled = false;
                els.btn.textContent = "Submit & Lock Records";
            }
        });

        loadData();
    </script>
</body>

</html>
